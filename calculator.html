<!DOCTYPE html>
<html>
<head>
<title>Calculator</title>
<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#fc466b,#3f5efb);
    font-family:'Segoe UI',sans-serif;
}

.calculator{
    width:320px;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(20px);
    padding:20px;
    border-radius:20px;
    box-shadow:0 20px 40px rgba(0,0,0,0.4);
}

.display{
    width:100%;
    height:60px;
    border:none;
    border-radius:12px;
    margin-bottom:20px;
    font-size:24px;
    text-align:right;
    padding:10px;
}

.buttons{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
}

button{
    padding:15px;
    border:none;
    border-radius:12px;
    font-size:18px;
    cursor:pointer;
    background:white;
    transition:0.2s;
}

button:hover{
    transform:scale(1.05);
}

.operator{
    background:#ff7675;
    color:white;
}

.equal{
    background:#00b894;
    color:white;
    grid-column:span 2;
}
</style>
</head>

<body>

<div class="calculator">
<input type="text" class="display" placeholder="0">

<div class="buttons">
<button>7</button>
<button>8</button>
<button>9</button>
<button class="operator">/</button>

<button>4</button>
<button>5</button>
<button>6</button>
<button class="operator">*</button>

<button>1</button>
<button>2</button>
<button>3</button>
<button class="operator">-</button>

<button>0</button>
<button>.</button>
<button class="equal">=</button>
<button class="operator">+</button>
</div>

</div>

</body>
</html>
